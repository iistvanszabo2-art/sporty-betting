spring:
  application:
    name: settlement-service

  datasource:
    url: jdbc:h2:mem:settlementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

rocketmq:
  name-server: localhost:9876
  producer:
    group: settlement-producer-group   # required by starter even for consumer-only use

server:
  port: 8083

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
  level:
    com.sporty.settlement: DEBUG
    org.apache.rocketmq: WARN
