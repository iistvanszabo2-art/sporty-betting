# RocketMQ broker configuration — Docker Compose mode
# brokerIP1=rocketmq-broker advertises the Docker service name so that other
# containers (bet-matcher-service, settlement-service) can reach the broker.
brokerClusterName=DefaultCluster
brokerName=broker-a
brokerId=0
namesrvAddr=rocketmq-namesrv:9876
brokerIP1=rocketmq-broker
autoCreateTopicEnable=true
defaultTopicQueueNums=4
deleteWhen=04
fileReservedTime=48
brokerRole=ASYNC_MASTER
flushDiskType=ASYNC_FLUSH
